name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
      - 'tests/**.py'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Chay pytest tren thu muc tests/ voi co -v
        run: python -m pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2: Ghi noi dung credentials ra file tam va set bien moi truong xac thuc.
        env:
          CLOUD_CREDENTIALS_DATA: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          echo "$CLOUD_CREDENTIALS_DATA" > sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/sa-key.json" >> $GITHUB_ENV

      - name: Verify credentials file
        run: |
          python -c "import os, json; print('File size:', os.path.getsize('sa-key.json')); d=json.load(open('sa-key.json')); print('Keys in JSON:', list(d.keys()))"

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu cloud storage bang lenh dvc pull.
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        # TODO 5: Upload models/model.pkl len cloud storage
        run: |
          python - <<'EOF'
          from google.cloud import storage
          import os

          bucket_name = os.environ.get("CLOUD_BUCKET", "${{ secrets.CLOUD_BUCKET }}")
          client = storage.Client()
          bucket = client.bucket(bucket_name)

          # Upload model
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print(f"Model uploaded to gs://{bucket_name}/models/latest/model.pkl")

          # Bonus 4: Upload metrics.json hien tai de lan sau so sanh
          blob_metrics = bucket.blob("models/latest/metrics.json")
          blob_metrics.upload_from_filename("outputs/metrics.json")
          print(f"Metrics uploaded to gs://{bucket_name}/models/latest/metrics.json")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save metrics as artifact
        # Bonus 3: upload ca report.txt cung metrics.json
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Bonus 4: So sanh accuracy moi voi accuracy cu, chi deploy khi tot hon hoac bang.
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 6: Kiem tra accuracy >= 0.70
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          print(f"Accuracy hien tai: {acc:.4f}")

          # Kiem tra nguong toi thieu
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")

          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF

      # Bonus 4: So sanh voi accuracy cu
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install cloud SDK
        run: pip install google-cloud-storage

      - name: Authenticate to Cloud Storage
        env:
          CLOUD_CREDENTIALS_DATA: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          echo "$CLOUD_CREDENTIALS_DATA" > sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/sa-key.json" >> $GITHUB_ENV

      - name: Compare with previous accuracy (Bonus 4)
        run: |
          python - <<'EOF'
          import json
          from google.cloud import storage
          import os

          new_acc = float("${{ needs.train.outputs.accuracy }}")
          bucket_name = os.environ.get("CLOUD_BUCKET", "${{ secrets.CLOUD_BUCKET }}")

          try:
              client = storage.Client()
              bucket = client.bucket(bucket_name)
              blob = bucket.blob("models/latest/metrics.json")

              if blob.exists():
                  content = blob.download_as_text()
                  old_metrics = json.loads(content)
                  old_acc = old_metrics.get("accuracy", 0)
                  print(f"Accuracy cu: {old_acc:.4f}")
                  print(f"Accuracy moi: {new_acc:.4f}")

                  if new_acc < old_acc:
                      raise SystemExit(
                          f"ROLLBACK: accuracy moi ({new_acc:.4f}) < accuracy cu ({old_acc:.4f}). Huy deploy."
                      )
                  print("OK: Accuracy moi >= accuracy cu. Tiep tuc deploy.")
              else:
                  print("Khong tim thay metrics cu. Day la lan deploy dau tien. Tiep tuc.")
          except SystemExit:
              raise
          except Exception as e:
              print(f"Khong the so sanh voi accuracy cu: {e}")
              print("Tiep tuc deploy (lan dau tien hoac khong co metrics cu).")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Cloud Storage
        env:
          CLOUD_CREDENTIALS_DATA: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          echo "$CLOUD_CREDENTIALS_DATA" > sa-key.json

      - name: Create directories on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p ~/models ~/src

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/serve.py,sa-key.json"
          target: "/home/${{ secrets.VM_USER }}/"

      - name: SSH deploy and configure service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # 1. Cai dat cac thu vien can thiet
            sudo apt update && sudo apt install -y python3-pip
            pip3 install fastapi uvicorn scikit-learn joblib google-cloud-storage

            # 2. Tao systemd service file
            sudo tee /etc/systemd/system/mlops-serve.service > /dev/null <<'EOF'
            [Unit]
            Description=MLOps Model Inference Server
            After=network.target

            [Service]
            User=${{ secrets.VM_USER }}
            WorkingDirectory=/home/${{ secrets.VM_USER }}
            Environment="GCS_BUCKET=${{ secrets.CLOUD_BUCKET }}"
            Environment="GOOGLE_APPLICATION_CREDENTIALS=/home/${{ secrets.VM_USER }}/sa-key.json"
            ExecStart=/usr/bin/python3 /home/${{ secrets.VM_USER }}/src/serve.py
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            # 3. Enable va restart service
            sudo systemctl daemon-reload
            sudo systemctl enable mlops-serve
            sudo systemctl restart mlops-serve

            # 4. Cho server san sang roi goi curl /health de xac nhan
            sleep 10
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
